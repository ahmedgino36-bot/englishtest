<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>English Level Test - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-box">
    <h2>Start Your English Level Test</h2>

    <input id="name" type="text" placeholder="Enter your name" required>
    <input id="age" type="number" placeholder="Enter your age" required>

    <button onclick="startQuiz()">Start Test</button>
  </div>

<script>
  function startQuiz() {
    const name = document.getElementById("name").value.trim();
    const age = document.getElementById("age").value.trim();

    if (!name || !age) {
      alert("Please enter your name and age");
      return;
    }

    localStorage.setItem("username", name);
    localStorage.setItem("age", age);
    localStorage.setItem("playMusic", "yes");

    window.location.href = "quiz.html";
  }
</script>

</body>
</html>
