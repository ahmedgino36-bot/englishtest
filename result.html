<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Result</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="result-box">
    <h2>Your Result</h2>

    <p>Name: <span id="rName"></span></p>
    <p>Age: <span id="rAge"></span></p>
    <p>Score: <span id="rScore"></span> / 60</p>

    <button onclick="window.location.href='certificate.html'">View Certificate</button>
    <button onclick="window.location.href='index.html'">Retake Test</button>
  </div>

  <script>
    document.getElementById("rName").innerText = localStorage.getItem("username");
    document.getElementById("rAge").innerText = localStorage.getItem("age");
    document.getElementById("rScore").innerText = localStorage.getItem("score");
  </script>

</body>
</html>
